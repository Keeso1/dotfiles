# ── Prefix ───────────────────────────────
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# ── General ──────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-window-option -g mode-keys vi

# ── Pywal Colors ─────────────────────────
run-shell "sed 's/set \\$\\(color[0-9]*\\|background\\|foreground\\)/set -g @\\1/g' ~/.cache/wal/colors-sway | grep '^set -g' | sed 's/ #/ \"#/; s/$/\"/' > /tmp/wal-tmux.conf && tmux source-file /tmp/wal-tmux.conf"
# ── Reload ───────────────────────────────
unbind r
bind r source-file ~/.tmux.conf\; display "Reloaded!"

# ── Pane Splits ──────────────────────────
bind-key "'" split-window -h
bind-key [ split-window -v

# ── Pane Navigation ──────────────────────
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ── Pane Borders ─────────────────────────
set -g pane-border-style "fg=#{@color8}"
set -g pane-active-border-style "fg=#{@color4}"

# ── Copy Mode ────────────────────────────
bind Space copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind p paste-buffer

# ── Park / Join Pane ─────────────────────
bind-key P break-pane
bind-key p join-pane -h -t :1

# ── Status Bar ───────────────────────────
set-option -g status-position top
set -g status-interval 5
set -g status-right-length 100
set -g status-left-length 100
set -g status-left '#[fg=#{@color14},bold] #S #[fg=#{@color8}]│ '
set -g status-right '#[fg=#{@color7}]CPU: #{cpu_percentage} #[fg=#{@color8}]│#[fg=#{@color7}] RAM: #{ram_percentage} | UPTIME: #{uptime}'
# ── Plugins ──────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'robhurring/tmux-uptime'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── vim-tmux-navigator ───────────────────
set -g @vim_navigator_mapping_left "C-Left C-h"
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""
set -g @vim_navigator_prefix_mapping_clear_screen ""
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +@vim_navigator_pattern$'"
set -g @vim_navigator_check "${is_vim}"

# ── TPM (keep at bottom) ─────────────────
run '~/.config/tmux/plugins/tpm/tpm'
